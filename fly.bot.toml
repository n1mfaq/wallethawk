# Fly.io deployment config — Bot
# Deploy: fly deploy --config fly.bot.toml --dockerfile src/WalletHawk.Bot/Dockerfile

app = "wallethawk-bot"
primary_region = "fra"          # change to nearest: ams, fra, waw, otp...
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "src/WalletHawk.Bot/Dockerfile"

[env]
  ASPNETCORE_URLS = "http://0.0.0.0:8080"
  ASPNETCORE_ENVIRONMENT = "Production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "get"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
