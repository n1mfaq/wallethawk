<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <rect width="512" height="512" rx="120" ry="120" fill="#0a0a12"/>

    <!-- subtle accent line top-left to give the mark visual anchor -->
    <rect x="48" y="48" width="80" height="4" fill="#00f0ff" opacity="0.85"/>
    <rect x="48" y="48" width="4" height="80" fill="#00f0ff" opacity="0.85"/>

    <!-- WH monogram -->
    <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
       font-weight="900"
       fill="#ffffff">
        <text x="256" y="345" font-size="280" text-anchor="middle" letter-spacing="-12">WH</text>
    </g>

    <!-- bottom-right tick — micro brand detail -->
    <rect x="384" y="460" width="80" height="4" fill="#ff2bd6" opacity="0.85"/>
    <rect x="460" y="384" width="4" height="80" fill="#ff2bd6" opacity="0.85"/>
</svg>
