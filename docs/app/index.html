<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>WalletHawk Dashboard</title>
    <meta name="description" content="WalletHawk Mini App — your tracked wallets, transaction timeline and weekly USDT flow." />

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E🦅%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://wallethawk-bot.fly.dev" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="app.css" />

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow g1" aria-hidden="true"></div>
    <div class="bg-glow g2" aria-hidden="true"></div>

    <header class="head">
        <a class="logo" href="/wallethawk/">🦅 <span>WalletHawk</span></a>
        <span class="plan" id="plan-badge">—</span>
    </header>

    <main>
        <!-- ── Hero stats ─────────────────────────────────────────────── -->
        <section class="hero">
            <h1 id="hello">Hello.</h1>

            <div class="kpi" id="kpi">
                <div><b data-kpi="wallets">—</b><span>wallets</span></div>
                <div><b data-kpi="in">—</b><span>in (7d)</span></div>
                <div><b data-kpi="out">—</b><span>out (7d)</span></div>
            </div>

            <div class="chart-wrap">
                <svg id="chart" viewBox="0 0 600 160" preserveAspectRatio="none" aria-label="USDT flow last 7 days"></svg>
                <p class="chart-empty" id="chart-empty">No transactions yet — add a wallet in the bot to start tracking.</p>
            </div>
        </section>

        <!-- ── Wallets ────────────────────────────────────────────────── -->
        <section class="block">
            <h2><span class="b">[</span> wallets <span class="b">]</span></h2>
            <ul class="wallets" id="wallets">
                <li class="empty">loading…</li>
            </ul>
        </section>

        <!-- ── Transactions ───────────────────────────────────────────── -->
        <section class="block">
            <h2><span class="b">[</span> recent transactions <span class="b">]</span></h2>
            <ul class="txs" id="txs">
                <li class="empty">loading…</li>
            </ul>
        </section>
    </main>

    <footer>
        <p>© <span id="year"></span> WalletHawk · <a href="https://t.me/wallethawk_bot">open bot</a></p>
    </footer>

    <div id="error" class="error" hidden></div>

    <script src="app.js"></script>
</body>
</html>
