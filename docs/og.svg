<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#07070d"/>
            <stop offset="1" stop-color="#1a0d2e"/>
        </linearGradient>
        <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#00f0ff"/>
            <stop offset="1" stop-color="#ff2bd6"/>
        </linearGradient>
        <radialGradient id="glow1" cx="0.15" cy="0.1" r="0.5">
            <stop offset="0" stop-color="#00f0ff" stop-opacity="0.45"/>
            <stop offset="1" stop-color="#00f0ff" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="glow2" cx="0.85" cy="0.95" r="0.5">
            <stop offset="0" stop-color="#ff2bd6" stop-opacity="0.5"/>
            <stop offset="1" stop-color="#ff2bd6" stop-opacity="0"/>
        </radialGradient>
        <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
            <path d="M48 0 L0 0 0 48" fill="none" stroke="#00f0ff" stroke-opacity="0.07" stroke-width="1"/>
        </pattern>
    </defs>

    <rect width="1200" height="630" fill="url(#bg)"/>
    <rect width="1200" height="630" fill="url(#grid)"/>
    <rect width="1200" height="630" fill="url(#glow1)"/>
    <rect width="1200" height="630" fill="url(#glow2)"/>

    <!-- Logo + brand -->
    <g transform="translate(80, 80)">
        <text x="0" y="0" font-family="system-ui, sans-serif" font-size="48" fill="#fff">🦅</text>
        <text x="68" y="0" font-family="'Orbitron', system-ui, sans-serif" font-size="32" font-weight="800" fill="#fff" letter-spacing="2">
            WALLET<tspan fill="#00f0ff">HAWK</tspan>
        </text>
    </g>

    <!-- Live status badge -->
    <g transform="translate(80, 130)">
        <rect x="0" y="0" rx="14" ry="14" width="280" height="28" fill="rgba(41,217,126,0.08)" stroke="rgba(41,217,126,0.4)"/>
        <circle cx="16" cy="14" r="4" fill="#29d97e"/>
        <text x="30" y="19" font-family="'JetBrains Mono', monospace" font-size="11" fill="#a8a8c0" letter-spacing="2">LIVE · TRC20 USDT TRACKING</text>
    </g>

    <!-- Main title -->
    <g transform="translate(80, 220)">
        <text font-family="'Orbitron', system-ui, sans-serif" font-size="84" font-weight="900" fill="#fff" letter-spacing="-2">
            <tspan x="0" dy="0">Watch your</tspan>
            <tspan x="0" dy="92" fill="url(#grad)">TRC20 wallets</tspan>
            <tspan x="0" dy="92" fill="#fff">in Telegram.</tspan>
        </text>
    </g>

    <!-- Bottom badge -->
    <g transform="translate(80, 540)">
        <rect x="0" y="0" rx="10" ry="10" width="240" height="44" fill="#00f0ff"/>
        <text x="120" y="29" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#07070d" text-anchor="middle" letter-spacing="1">@wallethawk_bot →</text>
    </g>

    <!-- Right-side phone preview -->
    <g transform="translate(760, 200)">
        <rect x="0" y="0" rx="22" ry="22" width="360" height="320" fill="rgba(20,12,36,0.85)" stroke="rgba(255,255,255,0.08)"/>
        <line x1="0" y1="44" x2="360" y2="44" stroke="rgba(255,255,255,0.08)"/>

        <!-- bar -->
        <text x="20" y="28" font-family="'Orbitron', system-ui, sans-serif" font-size="14" fill="#fff" letter-spacing="1">WalletHawk</text>
        <rect x="296" y="14" rx="10" ry="10" width="44" height="20" fill="#00f0ff"/>
        <text x="318" y="28" font-family="'JetBrains Mono', monospace" font-size="9" fill="#07070d" font-weight="800" text-anchor="middle" letter-spacing="1.5">PRO</text>

        <!-- KPI row -->
        <text x="20" y="80" font-family="'Orbitron', system-ui, sans-serif" font-size="22" fill="#fff">Hello, you.</text>
        <g transform="translate(20, 100)">
            <rect width="320" height="60" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.08)"/>
            <text x="55"  y="32" font-family="'Orbitron', system-ui, sans-serif" font-size="20" fill="#fff" text-anchor="middle">3</text>
            <text x="55"  y="48" font-family="'JetBrains Mono', monospace" font-size="9" fill="#8a8aa0" text-anchor="middle" letter-spacing="1.5">WALLETS</text>
            <line x1="106" y1="10" x2="106" y2="50" stroke="rgba(255,255,255,0.08)"/>
            <text x="160" y="32" font-family="'Orbitron', system-ui, sans-serif" font-size="20" fill="#fff" text-anchor="middle">1.2K</text>
            <text x="160" y="48" font-family="'JetBrains Mono', monospace" font-size="9" fill="#8a8aa0" text-anchor="middle" letter-spacing="1.5">IN (7D)</text>
            <line x1="214" y1="10" x2="214" y2="50" stroke="rgba(255,255,255,0.08)"/>
            <text x="265" y="32" font-family="'Orbitron', system-ui, sans-serif" font-size="20" fill="#fff" text-anchor="middle">847</text>
            <text x="265" y="48" font-family="'JetBrains Mono', monospace" font-size="9" fill="#8a8aa0" text-anchor="middle" letter-spacing="1.5">OUT (7D)</text>
        </g>

        <!-- Mini chart -->
        <g transform="translate(20, 180)">
            <rect width="320" height="80" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.08)"/>
            <g transform="translate(8, 8)">
                <rect x="0"   y="36" width="14" height="36" rx="2" fill="#29d97e"/>
                <rect x="16"  y="50" width="14" height="22" rx="2" fill="#ff5f7a"/>
                <rect x="44"  y="22" width="14" height="50" rx="2" fill="#29d97e"/>
                <rect x="60"  y="58" width="14" height="14" rx="2" fill="#ff5f7a"/>
                <rect x="88"  y="44" width="14" height="28" rx="2" fill="#29d97e"/>
                <rect x="104" y="32" width="14" height="40" rx="2" fill="#ff5f7a"/>
                <rect x="132" y="14" width="14" height="58" rx="2" fill="#29d97e"/>
                <rect x="148" y="42" width="14" height="30" rx="2" fill="#ff5f7a"/>
                <rect x="176" y="24" width="14" height="48" rx="2" fill="#29d97e"/>
                <rect x="192" y="56" width="14" height="16" rx="2" fill="#ff5f7a"/>
                <rect x="220" y="6"  width="14" height="66" rx="2" fill="#29d97e"/>
                <rect x="236" y="48" width="14" height="24" rx="2" fill="#ff5f7a"/>
                <rect x="264" y="30" width="14" height="42" rx="2" fill="#29d97e"/>
                <rect x="280" y="38" width="14" height="34" rx="2" fill="#ff5f7a"/>
            </g>
        </g>

        <!-- Sample tx row -->
        <g transform="translate(20, 274)">
            <rect width="320" height="32" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.08)"/>
            <circle cx="18" cy="16" r="9" fill="rgba(41,217,126,0.12)"/>
            <text x="18" y="20" font-family="system-ui" font-size="10" fill="#29d97e" text-anchor="middle">↓</text>
            <text x="36" y="14" font-family="system-ui" font-size="10" fill="#fff">coffee fund</text>
            <text x="36" y="26" font-family="'JetBrains Mono', monospace" font-size="8" fill="#8a8aa0">TXy…Def · 2m ago</text>
            <text x="304" y="20" font-family="'Orbitron', system-ui, sans-serif" font-size="11" font-weight="700" fill="#29d97e" text-anchor="end">+500.00 USDT</text>
        </g>
    </g>
</svg>
